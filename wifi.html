<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeWiFi Finder - 無料WiFiスポットを探す</title>
<meta name="description" content="現在地周辺の無料WiFiスポットを地図と一覧で探せるアプリ。OpenStreetMapのオープンデータを利用。">
<meta name="theme-color" content="#0066cc">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --primary: #0066cc;
    --primary-dark: #004a99;
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #1f2933;
    --muted: #647280;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
    z-index: 1100;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .logo { font-size: 22px; }
  header .sub { font-size: 12px; opacity: .85; margin-left: auto; }
  .controls {
    background: var(--card);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  button.action {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  button.action:hover { background: var(--primary-dark); }
  button.action:disabled { background: #9bb6d4; cursor: default; }
  button.ghost {
    background: #eef3f9; color: var(--primary); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.ghost:hover { background: #e0e9f4; }
  button.ghost.on { background: var(--primary); color: #fff; }
  .radius-select { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13px;
    background: #fff;
  }
  .geocode { display: flex; gap: 6px; align-items: center; flex: 1 1 200px; min-width: 170px; margin: 0; }
  .geocode input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
  }
  .toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
  .toggle input { width: 16px; height: 16px; }
  .status { font-size: 13px; color: var(--muted); margin-left: auto; min-width: 120px; text-align: right; }
  .main { flex: 1; display: flex; min-height: 0; position: relative; }
  #map { flex: 1; min-height: 0; }
  .search-here {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 600; background: var(--primary); color: #fff; border: none;
    border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,.25); cursor: pointer;
  }
  .search-here[hidden] { display: none; }
  .wifi-pin { background: none; border: none; }
  .recenter {
    background: #fff; width: 34px; height: 34px; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,.3); border: none; cursor: pointer;
    font-size: 18px; line-height: 34px; text-align: center; padding: 0;
  }
  .recenter:hover { background: #f0f5fb; }
  .sidebar {
    width: 340px;
    background: var(--card);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar .summary {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 5;
  }
  .spot {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .spot:hover { background: #f0f5fb; }
  .spot.active { background: #e3eefb; }
  .spot .name { font-weight: 600; font-size: 15px; margin-bottom: 3px; padding-right: 34px; }
  .spot .meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .spot .dist { color: var(--primary); font-weight: 600; font-size: 13px; }
  .spot .links { margin-top: 6px; display: flex; gap: 12px; }
  .spot .links a { font-size: 12px; color: var(--primary); text-decoration: none; }
  .spot .links a:hover { text-decoration: underline; }
  .fav-btn {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; font-size: 20px; cursor: pointer;
    line-height: 1; padding: 2px; color: #cbd5e1;
  }
  .fav-btn.on { color: #f4b400; }
  .badge {
    display: inline-block;
    background: #e6f4ea;
    color: #1e7e34;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-top: 4px;
    margin-right: 4px;
  }
  .badge.fee { background: #fff3cd; color: #856404; }
  .badge.paid { background: #fde2e2; color: #a12626; }
  .empty { padding: 30px 16px; text-align: center; color: var(--muted); font-size: 14px; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #cbd5e1;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: inline-block;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    flex-shrink: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--primary); }
  @media (max-width: 720px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 45%; }
    header .sub { display: none; }
    .status { margin-left: 0; flex-basis: 100%; text-align: left; }
  }
</style>
</head>
<body>
<header>
  <span class="logo">📶</span>
  <h1>FreeWiFi Finder</h1>
  <span class="sub">無料WiFiスポットを探す</span>
</header>

<div class="controls">
  <button class="action" id="locateBtn">📍 現在地</button>
  <form class="geocode" id="geoForm">
    <input type="text" id="placeInput" placeholder="地名で検索（例: 渋谷駅）" autocomplete="off">
    <button class="action" type="submit" id="searchBtn">🔍</button>
  </form>
  <div class="radius-select">
    <label for="radius">範囲</label>
    <select id="radius">
      <option value="500">500m</option>
      <option value="1000" selected>1km</option>
      <option value="2000">2km</option>
      <option value="5000">5km</option>
    </select>
  </div>
  <label class="toggle"><input type="checkbox" id="freeOnly">無料のみ</label>
  <button class="ghost" id="favBtn">⭐ お気に入り</button>
  <span class="status" id="status">「現在地」を押すか地名で検索</span>
</div>

<div class="main">
  <div id="map"></div>
  <button class="search-here" id="searchHere" hidden>🔄 このエリアを再検索</button>
  <aside class="sidebar">
    <div class="summary" id="summary">スポットがここに表示されます</div>
    <div id="list"></div>
  </aside>
</div>

<footer>
  データ提供: <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a>
  ／ 検索: Overpass / Nominatim ｜ <a href="terms.html">利用規約</a> ｜ <a href="privacy.html">プライバシーポリシー</a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  "use strict";

  var map = L.map("map", { zoomControl: true }).setView([35.681236, 139.767125], 13); // 初期: 東京駅
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  var statusEl = document.getElementById("status");
  var summaryEl = document.getElementById("summary");
  var listEl = document.getElementById("list");
  var locateBtn = document.getElementById("locateBtn");
  var radiusEl = document.getElementById("radius");
  var freeOnlyEl = document.getElementById("freeOnly");
  var favBtn = document.getElementById("favBtn");
  var geoForm = document.getElementById("geoForm");
  var placeInput = document.getElementById("placeInput");
  var searchHereEl = document.getElementById("searchHere");

  var userMarker = null;
  var spotLayer = L.layerGroup().addTo(map);
  var markerById = {};
  var lastUserPos = null;
  var allSpots = [];      // 直近検索の結果（フィルタ前）
  var view = "results";   // "results" | "favorites"
  var programmatic = false; // 地図のプログラム移動中フラグ（ユーザー操作と区別）

  // 地図をコード側で移動する間は moveend を無視させる
  function moveMap(fn) {
    programmatic = true;
    fn();
    setTimeout(function () { programmatic = false; }, 400);
  }

  // ---- 設定の保存／復元（localStorage） ----
  var SET_KEY = "freewifi:settings";
  function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SET_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveSettings() {
    try {
      localStorage.setItem(SET_KEY, JSON.stringify({
        radius: radiusEl.value,
        freeOnly: freeOnlyEl.checked,
        center: lastUserPos
      }));
    } catch (e) {}
  }

  // ---- お気に入り（localStorage） ----
  var FAV_KEY = "freewifi:favs";
  function loadFavs() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveFavs(f) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(f)); } catch (e) {}
  }
  function isFav(id) { return !!loadFavs()[id]; }
  function toggleFav(s) {
    var f = loadFavs();
    if (f[s.id]) { delete f[s.id]; }
    else { f[s.id] = { id: s.id, lat: s.lat, lon: s.lon, name: s.name, cat: s.cat, fee: s.fee, ssid: s.ssid }; }
    saveFavs(f);
    return !!loadFavs()[s.id];
  }

  function setStatus(html) { statusEl.innerHTML = html; }

  function haversine(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function fmtDist(m) {
    if (m == null) return "";
    if (m < 1000) return Math.round(m) + " m";
    return (m / 1000).toFixed(2) + " km";
  }

  // 徒歩のおおよその所要時間（80m/分 ≒ 4.8km/h）
  function walkMin(m) {
    if (m == null) return "";
    var min = Math.round(m / 80);
    return min <= 0 ? "1分未満" : "徒歩約" + min + "分";
  }

  function nameOf(tags) {
    if (!tags) return "名称不明のスポット";
    return tags["name:ja"] || tags.name || tags.operator || tags.brand ||
      categoryLabel(tags) || "名称不明のスポット";
  }

  function categoryLabel(tags) {
    var m = {
      cafe: "カフェ", restaurant: "レストラン", fast_food: "ファストフード",
      library: "図書館", fuel: "ガソリンスタンド", bar: "バー", pub: "パブ",
      bank: "銀行", hospital: "病院", townhall: "役所", community_centre: "公民館"
    };
    if (tags.amenity && m[tags.amenity]) return m[tags.amenity];
    if (tags.shop) return "店舗";
    if (tags.tourism) return "観光案内";
    if (tags.public_transport || tags.railway) return "駅・交通";
    return null;
  }

  // Overpass query: WiFi のある地点を網羅的に取得。
  function buildQuery(lat, lon, radius) {
    var a = "(around:" + radius + "," + lat + "," + lon + ")";
    var access = '["internet_access"]["internet_access"!~"^(no|false|none)$"]';
    return "[out:json][timeout:30];(" +
      "node" + access + a + ";" +
      "way"  + access + a + ";" +
      ");out center 400;";
  }

  function classifyFee(tags) {
    var fee = (tags["internet_access:fee"] || tags.fee || "").toLowerCase();
    if (fee === "customers") return "customers";
    if (fee === "yes" || fee === "some") return "paid";
    return "free";
  }

  var OVERPASS_ENDPOINTS = [
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter",
    "https://maps.mail.ru/osm/tools/overpass/api/interpreter"
  ];

  function fetchOverpass(query) {
    var attempt = 0;
    function tryNext() {
      if (attempt >= OVERPASS_ENDPOINTS.length) {
        return Promise.reject(new Error("すべてのデータサーバーへの接続に失敗しました"));
      }
      var url = OVERPASS_ENDPOINTS[attempt++];
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "data=" + encodeURIComponent(query)
      }).then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }).catch(function () {
        return tryNext();
      });
    }
    return tryNext();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function feeBadge(fee) {
    return fee === "customers" ? '<span class="badge fee">店舗利用者向け</span>'
      : fee === "paid" ? '<span class="badge paid">有料</span>'
      : '<span class="badge">無料WiFi</span>';
  }

  // 料金で色分けしたピン（緑=無料 / 橙=店舗利用者向け / 赤=有料）
  var FEE_COLOR = { free: "#1e7e34", customers: "#c77800", paid: "#b3261e" };
  function pinIcon(fee) {
    var color = FEE_COLOR[fee] || FEE_COLOR.free;
    var svg = '<svg width="26" height="38" viewBox="0 0 26 38" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M13 0C5.8 0 0 5.8 0 13c0 9.2 13 25 13 25s13-15.8 13-25C26 5.8 20.2 0 13 0z" fill="' + color + '"/>' +
      '<circle cx="13" cy="13" r="5.5" fill="#fff"/></svg>';
    return L.divIcon({
      className: "wifi-pin",
      html: svg,
      iconSize: [26, 38],
      iconAnchor: [13, 38],
      popupAnchor: [0, -34]
    });
  }

  // 経路案内リンク（マップアプリの徒歩ナビを起動）
  function dirUrl(lat, lon) {
    return "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon + "&travelmode=walking";
  }
  function osmUrl(lat, lon) {
    return "https://www.openstreetmap.org/?mlat=" + lat + "&mlon=" + lon + "#map=19/" + lat + "/" + lon;
  }

  function popupHtml(s) {
    var rows = "";
    if (s.cat) rows += escapeHtml(s.cat) + "<br>";
    if (s.dist != null) rows += "距離: " + fmtDist(s.dist) + "（" + walkMin(s.dist) + "）<br>";
    if (s.hours) rows += "🕒 " + escapeHtml(s.hours) + "<br>";
    if (s.ssid) rows += "SSID: " + escapeHtml(s.ssid) + "<br>";
    if (s.operator) rows += "運営: " + escapeHtml(s.operator) + "<br>";
    return '<strong>' + escapeHtml(s.name) + "</strong><br>" + feeBadge(s.fee) + "<br>" + rows +
      '<a href="' + dirUrl(s.lat, s.lon) + '" target="_blank" rel="noopener">🧭 ここへ行く</a> ｜ ' +
      '<a href="' + osmUrl(s.lat, s.lon) + '" target="_blank" rel="noopener">地図で開く</a>';
  }

  function buildSpotItem(s) {
    var div = document.createElement("div");
    div.className = "spot";
    div.dataset.id = s.id;

    var favOn = isFav(s.id);
    var detail = "";
    if (s.hours) detail += '<span>🕒 ' + escapeHtml(s.hours) + "</span>";

    div.innerHTML =
      '<button class="fav-btn ' + (favOn ? "on" : "") + '" title="お気に入り" aria-label="お気に入り">' +
        (favOn ? "★" : "☆") + "</button>" +
      '<div class="name">' + escapeHtml(s.name) + "</div>" +
      '<div class="meta">' +
        (s.dist != null ? '<span class="dist">📍 ' + fmtDist(s.dist) + " ・ " + walkMin(s.dist) + "</span>" : "") +
        (s.cat ? "<span>" + escapeHtml(s.cat) + "</span>" : "") +
        detail +
      "</div>" +
      feeBadge(s.fee) +
      (s.ssid ? '<span class="badge">SSID: ' + escapeHtml(s.ssid) + "</span>" : "") +
      '<div class="links">' +
        '<a href="' + dirUrl(s.lat, s.lon) + '" target="_blank" rel="noopener">🧭 ここへ行く</a>' +
        '<a href="' + osmUrl(s.lat, s.lon) + '" target="_blank" rel="noopener">🗺️ 地図で開く</a>' +
      "</div>";

    // お気に入りトグル（行クリックへ伝播させない）
    var favEl = div.querySelector(".fav-btn");
    favEl.addEventListener("click", function (e) {
      e.stopPropagation();
      var on = toggleFav(s);
      favEl.classList.toggle("on", on);
      favEl.textContent = on ? "★" : "☆";
      if (view === "favorites" && !on) { refresh(); }
    });

    // 行クリックで地図移動＋ポップアップ
    div.addEventListener("click", function () {
      map.setView([s.lat, s.lon], 17);
      if (markerById[s.id]) markerById[s.id].openPopup();
      document.querySelectorAll(".spot.active").forEach(function (e) { e.classList.remove("active"); });
      div.classList.add("active");
    });
    return div;
  }

  function placeMarkers(spots) {
    spotLayer.clearLayers();
    markerById = {};
    spots.forEach(function (s) {
      var marker = L.marker([s.lat, s.lon], { icon: pinIcon(s.fee) }).bindPopup(popupHtml(s));
      marker.addTo(spotLayer);
      markerById[s.id] = marker;
    });
  }

  // 結果ビュー（フィルタ適用）
  function renderResults() {
    var spots = allSpots.slice();
    if (freeOnlyEl.checked) spots = spots.filter(function (s) { return s.fee === "free"; });

    listEl.innerHTML = "";
    if (!spots.length) {
      placeMarkers([]);
      summaryEl.textContent = freeOnlyEl.checked
        ? "この範囲に『無料』のWiFiは見つかりませんでした。"
        : "この範囲にWiFi情報が見つかりませんでした。";
      listEl.innerHTML = '<div class="empty">😕 該当なし<br><br>' +
        '・検索範囲を <strong>5km</strong> に広げてみてください<br>' +
        (freeOnlyEl.checked ? '・「無料のみ」のチェックを外すと店舗利用者向けも表示します<br>' : '') +
        '・または地図の市街地を<strong>タップ</strong>すると、その地点で再検索します<br><br>' +
        '<span style="font-size:12px">※ OpenStreetMap に登録されたWiFi情報を表示しています。地方や住宅街は登録が少ない場合があります。</span></div>';
      return;
    }

    var freeCount = spots.filter(function (s) { return s.fee === "free"; }).length;
    summaryEl.innerHTML = "<strong>" + spots.length + "件</strong>のWiFiスポット" +
      (freeCount ? "（うち無料 " + freeCount + "件）" : "") + " ／ 無料・近い順";

    placeMarkers(spots);
    spots.forEach(function (s) { listEl.appendChild(buildSpotItem(s)); });
  }

  // お気に入りビュー
  function renderFavorites() {
    var favObj = loadFavs();
    var favs = Object.keys(favObj).map(function (k) { return favObj[k]; });
    favs.forEach(function (s) {
      s.dist = lastUserPos ? haversine(lastUserPos[0], lastUserPos[1], s.lat, s.lon) : null;
    });
    favs.sort(function (a, b) {
      if (a.dist == null || b.dist == null) return 0;
      return a.dist - b.dist;
    });

    listEl.innerHTML = "";
    if (!favs.length) {
      placeMarkers([]);
      summaryEl.textContent = "お気に入り（端末内に保存）";
      listEl.innerHTML = '<div class="empty">⭐ まだお気に入りがありません<br><br>一覧の ☆ をタップすると保存できます。</div>';
      return;
    }
    summaryEl.innerHTML = "<strong>" + favs.length + "件</strong>のお気に入り" + (lastUserPos ? "（近い順）" : "");
    placeMarkers(favs);
    var b = L.latLngBounds(favs.map(function (s) { return [s.lat, s.lon]; }));
    moveMap(function () { map.fitBounds(b.pad(0.2), { maxZoom: 16 }); });
    favs.forEach(function (s) { listEl.appendChild(buildSpotItem(s)); });
  }

  function refresh() {
    if (view === "favorites") renderFavorites();
    else renderResults();
  }

  function search(lat, lon) {
    lastUserPos = [lat, lon];
    view = "results";
    favBtn.classList.remove("on");
    searchHereEl.hidden = true;
    saveSettings();
    var radius = parseInt(radiusEl.value, 10);

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat, lon], {
      radius: 8, color: "#fff", weight: 2, fillColor: "#e63946", fillOpacity: 1
    }).addTo(map).bindPopup("現在地");
    moveMap(function () { map.setView([lat, lon], radius <= 1000 ? 16 : 14); });

    setStatus('<span class="spinner"></span> 周辺を検索中...');
    locateBtn.disabled = true;

    fetchOverpass(buildQuery(lat, lon, radius))
      .then(function (data) {
        allSpots = (data.elements || []).map(function (el) {
          var elat = el.lat != null ? el.lat : (el.center && el.center.lat);
          var elon = el.lon != null ? el.lon : (el.center && el.center.lon);
          if (elat == null || elon == null) return null;
          var tags = el.tags || {};
          return {
            id: el.type + "/" + el.id,
            lat: elat,
            lon: elon,
            name: nameOf(tags),
            cat: categoryLabel(tags),
            fee: classifyFee(tags),
            ssid: tags["internet_access:ssid"] || tags.wifi_ssid || null,
            hours: tags.opening_hours || null,
            operator: tags.operator || tags.brand || null,
            dist: haversine(lat, lon, elat, elon)
          };
        }).filter(Boolean);

        var feeRank = { free: 0, customers: 1, paid: 2 };
        allSpots.sort(function (a, b) {
          if (feeRank[a.fee] !== feeRank[b.fee]) return feeRank[a.fee] - feeRank[b.fee];
          return a.dist - b.dist;
        });
        refresh();
        setStatus(allSpots.length + " 件見つかりました");
      })
      .catch(function (err) {
        setStatus("⚠️ " + err.message);
        summaryEl.textContent = "検索に失敗しました。しばらくして再度お試しください。";
      })
      .finally(function () {
        locateBtn.disabled = false;
      });
  }

  // ---- 地名検索（Nominatim ジオコーディング） ----
  function geocode(q) {
    var url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=ja&q=" +
      encodeURIComponent(q);
    return fetch(url, { headers: { "Accept": "application/json" } })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); });
  }

  geoForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var q = placeInput.value.trim();
    if (!q) return;
    setStatus('<span class="spinner"></span> 「' + escapeHtml(q) + '」を検索中...');
    geocode(q)
      .then(function (res) {
        if (!res || !res.length) {
          setStatus("⚠️ 「" + escapeHtml(q) + "」が見つかりませんでした");
          return;
        }
        search(parseFloat(res[0].lat), parseFloat(res[0].lon));
      })
      .catch(function () { setStatus("⚠️ 地名検索に失敗しました"); });
  });

  // 現在地取得（isAuto: 起動時の自動取得。失敗してもうるさく出さない）
  function locate(isAuto) {
    if (!navigator.geolocation) {
      if (!isAuto) setStatus("⚠️ お使いのブラウザは位置情報に対応していません");
      return;
    }
    if (!isAuto) setStatus('<span class="spinner"></span> 現在地を取得中...');
    navigator.geolocation.getCurrentPosition(
      function (pos) { search(pos.coords.latitude, pos.coords.longitude); },
      function (err) {
        if (isAuto && lastUserPos) return; // 既に前回地点の結果を表示済みなら黙る
        var msg = "現在地を取得できませんでした";
        if (err.code === 1) msg = "位置情報が許可されませんでした。地名検索か、地図タップで探せます。";
        setStatus("⚠️ " + msg);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  }

  locateBtn.addEventListener("click", function () { locate(false); });

  // 地図クリックでも検索
  map.on("click", function (e) { search(e.latlng.lat, e.latlng.lng); });

  // ユーザーが地図を動かしたら「このエリアを再検索」を表示
  map.on("moveend", function () {
    if (programmatic || view !== "results") return;
    if (!lastUserPos) return;
    searchHereEl.hidden = false;
  });
  searchHereEl.addEventListener("click", function () {
    var c = map.getCenter();
    search(c.lat, c.lng);
  });

  // 現在地に戻るコントロール
  var RecenterControl = L.Control.extend({
    options: { position: "bottomright" },
    onAdd: function () {
      var b = L.DomUtil.create("button", "recenter");
      b.innerHTML = "📍";
      b.title = "現在地へ";
      L.DomEvent.disableClickPropagation(b);
      L.DomEvent.on(b, "click", function () { locate(false); });
      return b;
    }
  });
  map.addControl(new RecenterControl());

  radiusEl.addEventListener("change", function () {
    saveSettings();
    if (lastUserPos && view === "results") search(lastUserPos[0], lastUserPos[1]);
  });

  freeOnlyEl.addEventListener("change", function () {
    saveSettings();
    if (view === "results") renderResults();
  });

  favBtn.addEventListener("click", function () {
    view = (view === "favorites") ? "results" : "favorites";
    favBtn.classList.toggle("on", view === "favorites");
    if (view === "favorites") searchHereEl.hidden = true;
    refresh();
  });

  // ---- 起動時の初期化：設定復元 → 前回地点を即表示 → 現在地で更新 ----
  (function init() {
    var st = loadSettings();
    if (st.radius) radiusEl.value = st.radius;
    if (st.freeOnly) freeOnlyEl.checked = true;
    if (st.center && st.center.length === 2) {
      setStatus('<span class="spinner"></span> 前回の地点を表示中...');
      search(st.center[0], st.center[1]);
    }
    locate(true); // 現在地が取れれば最新で再検索
  })();

  // ---- PWA: Service Worker 登録 ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
